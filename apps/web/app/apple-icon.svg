<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="180" height="180">
  <defs>
    <linearGradient id="hs-arc-apple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5a1f"/>
      <stop offset="100%" stop-color="#ff8a3d"/>
    </linearGradient>
  </defs>
  <!-- Dark brand background (bg-0) — iOS overlays its own rounded mask on top. -->
  <rect width="64" height="64" fill="#050505"/>
  <!-- Radar arcs centered vertically: shifted dot from y=42 → y=38 so the
       full glyph sits centered in the 64x64 canvas instead of bottom-heavy. -->
  <path d="M 8 38 A 24 24 0 0 1 56 38" fill="none" stroke="url(#hs-arc-apple)" stroke-width="3.4" stroke-linecap="round" opacity="0.95"/>
  <path d="M 16 38 A 16 16 0 0 1 48 38" fill="none" stroke="url(#hs-arc-apple)" stroke-width="3.4" stroke-linecap="round" opacity="0.6"/>
  <path d="M 23 38 A 9 9 0 0 1 41 38" fill="none" stroke="url(#hs-arc-apple)" stroke-width="3.4" stroke-linecap="round" opacity="0.3"/>
  <circle cx="32" cy="38" r="3.6" fill="#ff8a3d"/>
  <circle cx="32" cy="38" r="1.7" fill="#ffffff" opacity="0.95"/>
</svg>
